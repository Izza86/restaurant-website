<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="La Maison — Experience the art of fine dining with exquisite dishes crafted from the freshest ingredients. Located in New York's Culinary District." />
    <meta name="theme-color" content="#D4AF37" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to Google Fonts for faster load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD Structured Data — Restaurant schema for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "La Maison",
      "description": "Experience the art of fine dining with exquisite dishes crafted from the freshest ingredients.",
      "url": "https://lamaison.com",
      "telephone": "(212) 555-1234",
      "email": "hello@lamaison.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Gourmet Avenue",
        "addressLocality": "New York",
        "addressRegion": "NY",
        "postalCode": "10001",
        "addressCountry": "US"
      },
      "servesCuisine": ["French", "Fine Dining", "Contemporary"],
      "priceRange": "$$$",
      "openingHours": ["Mo-Fr 11:00-22:00", "Sa-Su 10:00-23:00"],
      "image": "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1200&q=80",
      "starRating": {
        "@type": "Rating",
        "ratingValue": "1",
        "bestRating": "3",
        "worstRating": "0",
        "author": { "@type": "Organization", "name": "Michelin Guide" }
      }
    }
    </script>

    <title>La Maison — Fine Dining Restaurant</title>
  </head>
  <body class="font-body text-gray-800 bg-white">
    <!-- Skip-to-content for accessibility (keyboard users) -->
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[9999] focus:bg-primary-500 focus:text-charcoal focus:px-4 focus:py-2 focus:rounded-lg focus:font-semibold focus:text-sm"
    >
      Skip to content
    </a>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
